<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Namqa Studio — Espace d'édition</title>
  <meta name="theme-color" content="#2E2B7A" />
  <link rel="icon" type="image/png" href="/assets/images/namqa-logo-dark.png" />
</head>
<body>
  <!-- Netlify Identity widget (for login) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.3.0/dist/decap-cms.js"></script>

  <script>
    // Redirect to the main site after login, and open the CMS once logged in.
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
