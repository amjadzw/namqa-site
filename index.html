  <section class="section section--white" id="solution">
    <div class="container">
      <div class="section__head reveal-js"><!-- injected --></div>

      <div class="benefits">
        <div class="benefits__sticky">
          <div class="benefits__visual">
            <!-- Illustrated panels (static SVGs, kept in HTML). Order must match benefits 0..3 -->
            <svg class="b-illus active" data-panel="0" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#FF6B35"/>
                  <stop offset="100%" stop-color="#E85420"/>

              </defs>
              <rect x="80" y="110" width="240" height="150" rx="18" fill="url(#cardGrad)" />
              <text x="100" y="150" fill="white" font-family="Space Grotesk" font-weight="700" font-size="14" letter-spacing="2">NAMQA CARD</text>
              <text x="100" y="210" fill="white" font-family="Space Grotesk" font-weight="700" font-size="28">1 240 pts</text>
              <circle cx="280" cy="150" r="18" fill="white" opacity="0.3"/>
              <circle cx="300" cy="150" r="18" fill="white" opacity="0.3"/>
              <text x="100" y="240" fill="white" font-family="Inter" font-size="12" opacity="0.8">Ambassadeur · Niveau Gold</text>
              <g fill="white" opacity="0.9">
                <circle cx="60" cy="80" r="3"/><circle cx="340" cy="90" r="2"/><circle cx="50" cy="300" r="2"/><circle cx="350" cy="310" r="3"/>
              </g>
            </svg>

            <svg class="b-illus" data-panel="1" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
              <rect x="60" y="80" width="280" height="240" rx="20" fill="white" opacity="0.95"/>
              <rect x="80" y="110" width="120" height="12" rx="6" fill="#2E2E80"/>
              <rect x="80" y="134" width="200" height="8" rx="4" fill="#E6E6F2"/>
              <rect x="80" y="150" width="160" height="8" rx="4" fill="#E6E6F2"/>
              <polyline points="80,260 120,230 160,240 200,200 240,210 280,170 320,180" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
              <circle cx="280" cy="170" r="6" fill="#FF6B35"/>
              <rect x="80" y="280" width="240" height="8" rx="4" fill="#E6E6F2"/>
              <rect x="80" y="295" width="180" height="8" rx="4" fill="#E6E6F2"/>
            </svg>

            <svg class="b-illus" data-panel="2" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
              <rect x="140" y="60" width="120" height="240" rx="20" fill="#121240" stroke="white" stroke-width="3"/>
              <rect x="150" y="90" width="100" height="40" rx="8" fill="#FF6B35"/>
              <text x="160" y="108" fill="white" font-size="10" font-family="Inter" font-weight="600">NAMQA</text>
              <text x="160" y="122" fill="white" font-size="9" font-family="Inter">Nouvelle offre !</text>
              <rect x="150" y="140" width="100" height="30" rx="8" fill="white" opacity="0.1"/>
              <rect x="150" y="175" width="100" height="30" rx="8" fill="white" opacity="0.1"/>
              <circle cx="80" cy="100" r="28" fill="#FF6B35"/>
              <text x="80" y="110" text-anchor="middle" fill="white" font-size="28">🔔</text>
            </svg>

            <svg class="b-illus" data-panel="3" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
              <rect x="40" y="40" width="320" height="320" rx="20" fill="white" opacity="0.08"/>
              <circle cx="120" cy="140" r="12" fill="#FF6B35"/>
              <path d="M120 140 L120 170" stroke="#FF6B35" stroke-width="3"/>
              <circle cx="260" cy="180" r="12" fill="#FF6B35"/>
              <path d="M260 180 L260 210" stroke="#FF6B35" stroke-width="3"/>
              <circle cx="180" cy="270" r="12" fill="#FF6B35"/>
              <path d="M180 270 L180 300" stroke="#FF6B35" stroke-width="3"/>
              <circle cx="300" cy="280" r="12" fill="#FF6B35"/>
              <path d="M300 280 L300 310" stroke="#FF6B35" stroke-width="3"/>
              <path d="M120 140 Q 190 100 260 180 Q 220 230 180 270 Q 240 290 300 280" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.5"/>
            </svg>
          </div>
        </div>

        <div class="benefits__list"><!-- injected --></div>
      </div>
    </div>
  </section>

  <!-- =============== PRICING =============== -->
  <section class="section section--cream" id="tarifs">
    <div class="container">
      <div class="section__head reveal-js"><!-- injected --></div>
      <div class="pricing"><!-- injected --></div>
    </div>
  </section>

  <!-- =============== HOW IT WORKS =============== -->
  <section class="section section--white" id="how">
    <div class="container">
      <div class="section__head reveal-js"><!-- injected --></div>
      <div class="steps"><!-- injected --></div>
    </div>
  </section>

  <!-- =============== CTA BANNER =============== -->
  <section class="cta-banner reveal-js" style="background: linear-gradient(135deg, var(--violet-deeper) 0%, var(--violet) 50%, var(--orange-dark) 150%);"><!-- injected --></section>

  <!-- =============== TESTIMONIALS =============== -->
  <section class="section section--cream" id="temoignages">
    <div class="container">
      <div class="section__head reveal-js"><!-- injected --></div>

      <div class="testimonials">
        <div class="testimonials__track" id="testimonials-track"><!-- injected --></div>

        <div class="testimonials__controls">
          <button class="carousel-btn" data-dir="-1" aria-label="Témoignage précédent">
            <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
          </button>
          <button class="carousel-btn" data-dir="1" aria-label="Témoignage suivant">
            <i data-lucide="arrow-right" style="width:18px;height:18px;"></i>
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- =============== SOLUTIONS COMPLÉMENTAIRES =============== -->
  <section class="section section--white" id="solutions">
    <div class="container">
      <div class="section__head reveal-js"><!-- injected --></div>
      <div class="solutions"><!-- injected --></div>
    </div>
  </section>

  <!-- =============== FAQ =============== -->
  <section class="section section--cream" id="faq">
    <div class="container">
      <div class="section__head reveal-js"><!-- injected --></div>
      <div class="faq"><!-- injected --></div>
    </div>
  </section>

  <!-- =============== CONTACT FORM =============== -->
  <section class="contact-section" id="contact">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-intro reveal-js"><!-- injected --></div>
        <form
          class="contact-form reveal-js"
          name="contact"
          method="POST"
          data-netlify="true"
          netlify-honeypot="bot-field"
          action="/merci"
        >
          <!-- Netlify Forms hidden fields -->
          <input type="hidden" name="form-name" value="contact" />
          <p class="visually-hidden"><label>Ne pas remplir : <input name="bot-field" /></label></p>

          <div class="contact-form__row contact-form__row--3">
            <div class="field">
              <label for="cf-civ">Civilité<span class="req">*</span></label>
              <div class="select-wrap">
                <select id="cf-civ" name="civilite" required>
                  <option value="" disabled selected>Veuillez sélectionner</option>
                  <option>Madame</option>
                  <option>Monsieur</option>
                  <option>Autre / Non spécifié</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="cf-prenom">Prénom<span class="req">*</span></label>
              <input id="cf-prenom" name="prenom" type="text" required autocomplete="given-name" />
            </div>
            <div class="field">
              <label for="cf-nom">Nom<span class="req">*</span></label>
              <input id="cf-nom" name="nom" type="text" required autocomplete="family-name" />
            </div>
          </div>

          <div class="contact-form__row contact-form__row--2">
            <div class="field">
              <label for="cf-etab">Nom de l'établissement<span class="req">*</span></label>
              <input id="cf-etab" name="etablissement" type="text" required />
            </div>
            <div class="field">
              <label for="cf-secteur">Secteur d'activité<span class="req">*</span></label>
              <div class="select-wrap">
                <select id="cf-secteur" name="secteur" required>
                  <option value="" disabled selected>Veuillez sélectionner</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="cf-email">E-mail<span class="req">*</span></label>
            <input id="cf-email" name="email" type="email" required autocomplete="email" />
          </div>

          <div class="field">
            <label for="cf-tel">Téléphone<span class="req">*</span></label>
            <div class="phone-row">
              <div class="select-wrap select-wrap--country">
                <select id="cf-country" name="pays_indicatif" required>
                  <option value="+41" selected>🇨🇭 Switzerland (+41)</option>
                  <option value="+33">🇫🇷 France (+33)</option>
                  <option value="+49">🇩🇪 Germany (+49)</option>
                  <option value="+39">🇮🇹 Italy (+39)</option>
                  <option value="+32">🇧🇪 Belgium (+32)</option>
                  <option value="+352">🇱🇺 Luxembourg (+352)</option>
                  <option value="+44">🇬🇧 United Kingdom (+44)</option>
                </select>
              </div>
              <input id="cf-tel" name="telephone" type="tel" inputmode="tel" required placeholder="+41" autocomplete="tel" />
            </div>
          </div>

          <div class="field">
            <label for="cf-msg">Message (optionnel)</label>
            <textarea id="cf-msg" name="message" rows="4"></textarea>
          </div>

          <button type="submit" class="btn btn--primary btn--submit">
            <span class="btn__label"></span>
            <span class="btn__arrow">→</span>
          </button>
          <p class="contact-form__note">Vos données restent confidentielles · réponse sous 2h.</p>
        </form>
      </div>
    </div>
  </section>

  <!-- =============== FOOTER =============== -->
  <footer class="footer">
    <div class="container">
      <div class="footer__top"><!-- injected --></div>
      <div class="footer__bottom"><!-- injected --></div>
    </div>
  </footer>

  <!-- SCRIPTS -->
  <!-- 1. SVG illustrations for the 'Solutions' section (must load before cms-loader) -->
  <script src="assets/js/solutions-illus.js"></script>
  <!-- 2. CMS loader: fetches /content/*.json and renders everything -->
  <script src="assets/js/cms-loader.js"></script>
  <!-- 3. Main interactions: waits for 'namqa:content-ready' before wiring up -->
  <script src="assets/js/main.js" defer></script>
  <!-- 4. 3D phone -->
  <script type="module" src="assets/js/phone3d.js"></script>

  <!-- Netlify Identity: auto-redirect to /admin/ once logged in -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
