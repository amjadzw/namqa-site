[build]
  publish = "."
  # No build step — Decap CMS writes JSON directly, the browser reads JSON at runtime.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Ensure JSON content is served with correct MIME type and no aggressive caching
[[headers]]
  for = "/content/*.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=60, must-revalidate"
